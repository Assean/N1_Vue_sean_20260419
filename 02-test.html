<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>02-test</title>
    <script src="./vue.3.5.13.js"></script>
</head>
<body>
    <div id="app">
        <h1 id="score">{{score}}</h1>
        <p>{{text}}</p>
        <button @click="score++">+1</button>
        <button @click="score+= 2">+2</button>
        <button @click="score+= 3">+3</button>
        <button @click="score--">-1</button>
        <button @click="text='(已)改文字'">改文字</button>
    </div>
    <script>
        const{ createApp,ref } = Vue;
        createApp({
            setup() {
                const score = ref(10);
                const text = ref('1');
                return{score,text};
            }
        }).mount('#app')
    </script>
</body>
</html>
