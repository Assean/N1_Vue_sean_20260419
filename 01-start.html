<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>01 Vue 最小啟動</title>
    <script src="./vue.3.5.13.js"></script>
    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", "Microsoft JhengHei", sans-serif;
            background: linear-gradient(135deg, #fff4e8, #edf7ff);
            color: #17364b;
        }

        .box {
            max-width: 720px;
            margin: 48px auto;
            padding: 28px;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 18px 46px rgba(23, 54, 75, 0.12);
        }

        .mark {
            color: #ff7a59;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div id="app" class="box">
        <h1>{{ title }}</h1>
        <p>{{ text }}</p>
        <p>現在練習：<span class="mark">{{ item }}</span></p>
        <input type="text" v-model="title">
        <br>
        <input type="text" v-model="item">
        <br>
        <input type="text" v-model="text">
    </div>

    <script>
        const { createApp, ref } = Vue

        createApp({
            setup() {
                const title = ref('01 Vue')
                const text = ref('先看最基本的資料顯示，這是所有後面範例的起點。')
                const item = ref('createApp + setup + ref + mount')

                return { title, text, item }
            }
        }).mount('#app')
    </script>
</body>
</html>
