<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>05 基本動畫</title>
    <script src="./vue.3.5.13.js"></script>
    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", "Microsoft JhengHei", sans-serif;
            background: linear-gradient(135deg, #fff3e8, #eef8ff);
            color: #193448;
        }

        .box {
            max-width: 800px;
            margin: 48px auto;
            padding: 28px;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 20px 48px rgba(25, 52, 72, 0.12);
        }

        button {
            padding: 12px 18px;
            border: 0;
            border-radius: 14px;
            background: #ff7a59;
            color: #ffffff;
            cursor: pointer;
        }

        .panel {
            margin-top: 20px;
            padding: 24px;
            border-radius: 20px;
            background: linear-gradient(135deg, #18384f, #35617d);
            color: #ffffff;
        }

        .card-enter-active,
        .card-leave-active {
            transition: all 0.45s ease;
        }

        .card-enter-from,
        .card-leave-to {
            opacity: 0;
            transform: translateY(24px);
        }
        /* we will explain what these classes do next! */
        .v-enter-active,
        .v-leave-active {
        transition: opacity 0.5s ease;
        }

        .v-enter-from,
        .v-leave-to {
        opacity: 0;
        }
    </style>
</head>
<body>
    <div id="app" class="box">
        <h1>{{ title }}</h1>
        <p>{{ text }}</p>
        <button @click="togglePanel">切換內容</button>
        <transition name="card">
            <div v-if="isShow" class="panel">
                <h2>這是一個有進出場動畫的區塊</h2>
                <p>重點是 transition 的 name，要和 CSS class 前綴對得上。</p>
            </div>
        </transition>
        <button @click="show = !show">Toggle</button>
        <Transition>
        <p v-if="show">hello</p>
        </Transition>
    </div>

    <script>
        const { createApp, ref } = Vue

        createApp({
            setup() {
                const title = ref('05 基本動畫')
                const text = ref('先練一個最常用的淡入加位移動畫。')
                const isShow = ref(true)

                function togglePanel() {
                    isShow.value = !isShow.value
                }

                return { title, text, isShow, togglePanel }
            }
        }).mount('#app')
    </script>
</body>
</html>
