<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>03 輸入框綁定</title>
    <script src="./vue.3.5.13.js"></script>
    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", "Microsoft JhengHei", sans-serif;
            background: linear-gradient(135deg, #fff6ec, #ecfbff);
            color: #1e3447;
        }

        .box {
            max-width: 780px;
            margin: 48px auto;
            padding: 28px;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 20px 48px rgba(30, 52, 71, 0.12);
        }

        .input-box {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #d8e4ef;
            border-radius: 16px;
            font-size: 16px;
            box-sizing: border-box;
        }

        .card {
            margin-top: 18px;
            padding: 18px;
            border-radius: 18px;
            background: #f6f9fc;
        }
    </style>
</head>
<body>
    <div id="app" class="box">
        <h1>{{ title }}</h1>
        <p>{{ text }}</p>
        <input class="input-box" v-model="name" placeholder="請輸入名字">
        <div class="card">
            <p>你好，{{ name }}</p>
            <p>名字長度：{{ name.length }}</p>
        </div>
    </div>

    <script>
        const { createApp, ref } = Vue

        createApp({
            setup() {
                const title = ref('03 輸入框綁定')
                const text = ref('v-model 會讓輸入框和資料同步。')
                const name = ref('Amy')

                return { title, text, name }
            }
        }).mount('#app')
    </script>
</body>
</html>
