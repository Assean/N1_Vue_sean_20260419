<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="./vue.3.5.13.js"></script>
</head>
<body>
    <div id="app">
        <input type="text" @input="find()" v-model="search">
        <div class="list" v-for="(item,i) in list" :key="i">
            <p>{{item}}</p>
            <!-- <p v-if="!search || item.includes(search)">{{item}}</p> -->
        </div>
    </div>
    <script>
        const{ref,createApp} = Vue
        Vue.createApp({
            setup(){
                let search = ref("")
                fetch('api/get_data.php')
                .then(res => res.json())
                .then((data) => {
                    console.log(data);
                    console.log(data.list[0].name);
                    // list.value = data.name.list
                    arr.value = data.list
                    list.value = data.list
                    // status.value = '讀取完成，共' + data.list.length + ' 筆'
                })
                let arr = ref([
                    
                    // "apple",
                    // "4567",
                    // "44444",
                    // "1234",
                    // "vue"
                ])
                // let ar = []
                // ar.filter()
                let list = ref([])
                list.value = arr.value
                function find(){
                    console.log(arr)
                    list.value = arr.value.filter(item => item.name.includes(search.value))
                }
                
                return {search,find,list,arr}
            }
        }).mount("#app")
    </script>
</body>
</html>
