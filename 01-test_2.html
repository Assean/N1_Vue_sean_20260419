<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>01-test</title>
    <script src="./vue.3.5.13.js"></script>
</head>
<body>
    <div id="app_1">
        <h1>加法: {{(a)+(b)}}</h1>
        <input type="number" v-model="a">
        <span>+</span>
        <input type="number" v-model="b">
    </div>
    <div id="app_2">
        <h1>減法: {{(c)-(d)}}</h1>
        <input type="number" v-model="c">
        <span>-</span>
        <input type="number" v-model="d">
    </div>
    <script>
        const {createApp,ref} = Vue;
        // const {createApp,ref_2} = Vue;
        createApp({
            setup() {
                const a = ref(0);
                const b = ref(0);
                return{a,b};
            }
        }).mount('#app_1')
        createApp({
            setup() {
                const c = ref(0);
                const d = ref(0);
                return{c,d};
            }
        }).mount('#app_2')
    </script>
</body>
</html>
